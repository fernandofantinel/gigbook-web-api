version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "chore(deps)"

    labels:
      - "dependencies"

    reviewers:
      - "fernandofantinel"

    assignees:
      - "fernandofantinel"

    versioning-strategy: increase

    groups:
      dependencies:
        patterns:
          - "*"
